services:
  # ===================================================
  # 1. 基础设施：PostgreSQL (pgvector)
  # ===================================================
  db:
    image: pgvector/pgvector:pg16
    container_name: bakabooru_db
    restart: always
    environment:
      POSTGRES_USER: db_user
      POSTGRES_PASSWORD: db_password
      POSTGRES_DB: bakabooru
    ports: ["5432:5432"]
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks: [bakabooru-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U db_user -d bakabooru"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ===================================================
  # 2. 基础设施：MinIO
  # ===================================================
  minio:
    image: minio/minio
    container_name: bakabooru_minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio_user
      MINIO_ROOT_PASSWORD: minio_password
    ports: ["9000:9000", "9001:9001"]
    volumes:
      - ./data/minio:/data
    networks: [bakabooru-net]
    healthcheck:
      test:
        ["CMD-SHELL", "timeout 5s bash -c '</dev/tcp/localhost/9000' || exit 1"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio-createbuckets:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    networks: [bakabooru-net]
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 minio_user minio_password;
      /usr/bin/mc mb --ignore-existing myminio/images;
      /usr/bin/mc anonymous set public myminio/images;
      exit 0;
      "

  # ===================================================
  # 3. 基础设施：Redis
  # ===================================================
  redis:
    image: redis:alpine
    container_name: bakabooru_redis
    restart: always
    # 启动 Redis 并启用密码验证
    command: redis-server --requirepass redis_password
    ports: ["6379:6379"]
    volumes:
      - ./data/redis:/data
    networks: [bakabooru-net]
    healthcheck:
      # 使用 redis-cli ping 检查健康状态 (需要带上密码)
      test: ["CMD", "redis-cli", "-a", "redis_password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ===================================================
  # 4. AI计算：AI Service (Python FastAPI)
  # ===================================================
  backend-ai-service:
    build: ./backend/ai_service
    container_name: bakabooru_backend_ai_service
    restart: always
    gpus: all
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: db_user
      DB_PASS: db_password
      DB_NAME: bakabooru
      MINIO_HOST: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minio_user
      MINIO_SECRET_KEY: minio_password
      MINIO_BUCKET_NAME: images
      MODEL_CACHE_DIR: /model_cache
    volumes:
      - ./data/model_cache:/model_cache
    networks: [bakabooru-net]
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ===================================================
  # 5. 核心业务：Web Service (Java Spring Boot)
  # ===================================================
  backend-web-service:
    build: ./backend/web_service
    container_name: bakabooru_backend_web_service
    restart: always
    environment:
      # DB 配置
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: db_user
      DB_PASS: db_password
      DB_NAME: bakabooru
      # Redis 配置
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redis_password
      # MinIO 配置
      MINIO_HOST: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minio_user
      MINIO_SECRET_KEY: minio_password
      MINIO_BUCKET_NAME: images
      # AI 服务地址
      AI_SERVICE_URL: http://backend-ai-service:8000
      # 缩略图配置
      THUMBNAIL_MAX_SIZE: 1024
      THUMBNAIL_QUALITY: 0.85
      THUMBNAIL_FORMAT: jpg
      # AI 后处理并发数
      AI_CONCURRENCY: 10
    networks: [bakabooru-net]
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8080/actuator/health",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ===================================================
  # 6. 交互界面：Frontend (Nginx)
  # ===================================================
  frontend:
    build: ./frontend
    container_name: bakabooru_frontend
    restart: always
    ports: ["80:80"]
    networks: [bakabooru-net]
    depends_on:
      backend-web-service:
        condition: service_healthy

networks:
  bakabooru-net:
    driver: bridge
